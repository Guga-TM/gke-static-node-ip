apiVersion: v1
kind: ConfigMap
metadata:
  name: controller-config
  namespace: gke-static-node-ip
  labels:
    app: gke-static-node-ip
    component: controller
data:
  dynamic_json_nodes_data: ""
  check_rate_seconds: "{{ .Values.controller.checkRateSeconds }}"
  log_level: "{{ .Values.controller.logLevel }}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fixer-config
  namespace: gke-static-node-ip
  labels:
    app: gke-static-node-ip
    component: fixer
data:
  project_id: {{ .Values.projectId }}
  network_tier: {{ .Values.networkTier }}
  log_level: "{{ .Values.fixer.logLevel }}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: distributor-config
  namespace: gke-static-node-ip
  labels:
    app: gke-static-node-ip
    component: distributor
data:
  nodepools_desired_ips: |
    {{ .Values.nodesDesiredIps | toJson }}
  check_rate_seconds: "{{ .Values.distributor.checkRateSeconds }}"
  log_level: "{{ .Values.distributor.logLevel }}"