apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.gcpServiceAccount }}
  name: gke-static-node-ip
  namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: distributor
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gke-static-node-ip-distributor
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: ["apps"]
  resources: ["daemonsets"]
  resourceNames: ["controller"]
  verbs: ["get","create","patch","update","delete"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: distributor
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: distributor
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: gke-static-node-ip-distributor
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gke-static-node-ip-distributor
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: distributor
subjects:
- kind: ServiceAccount
  name: distributor
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: gke-static-node-ip-distributor
  apiGroup: rbac.authorization.k8s.io