apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.gcpServiceAccount }}
  name: gke-static-node-ip
  namespace: gke-static-node-ip
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: distributor
  namespace: gke-static-node-ip
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: gke-static-node-ip-distributor
  namespace: default
rules:
- apiGroups: ["apps"]
  resources: ["daemonsets"]
  resourceNames: ["controller"]
  verbs: ["get","patch","update"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: distributor
  namespace: default
subjects:
- kind: ServiceAccount
  name: distributor
  namespace: gke-static-node-ip
roleRef:
  kind: Role
  name: gke-static-node-ip-distributor
  apiGroup: rbac.authorization.k8s.io